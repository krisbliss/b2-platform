name: death_certificate_verification
description: >
  Verifies the death certificate the user most recently uploaded: runs the full
  reliability pipeline (document, authenticity, narrative consistency, score) and,
  if it passes, hands the case off to GiveLight. Call this once the user has sent a
  document image — the image is pulled automatically and you do not pass it in.
input_schema:
  type: object
  properties: {}
implementation:
  type: function
  needs_context: true
  handler: tools.death_certificate_pipeline.verify.verify_death_certificate
